spring.application.name=key-value-service

# ==========================
# PostgreSQL Configuration
# ==========================
spring.datasource.url=jdbc:postgresql://localhost:5432/kv_db
spring.datasource.username=postgres
spring.datasource.password=postgres


spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
# ==========================
# JPA / Hibernate
# ==========================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ==========================
# Redis Configuration
# ==========================
spring.data.redis.host=localhost
spring.data.redis.port=6379

# ==========================
# Server Configuration
# ==========================
server.port=8097


eureka.client.service-url.defaultZone=http://localhost:8761/eureka

spring.kafka.bootstrap-servers=localhost:9092

app.kafka.topic=kv-events

spring.kafka.consumer.group-id=kv-group

spring.kafka.consumer.auto-offset-reset=earliest

spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer

spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer

spring.kafka.consumer.properties.spring.json.trusted.packages=com.dist.key_value_service.event
